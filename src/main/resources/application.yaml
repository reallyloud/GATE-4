spring:
  application:
    name: employee-service
  datasource:
    url: jdbc:postgresql://localhost:5432/employeeCrm
    username: postgres
    password: 6881
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
    drop-first: false
server:
  port: 8080
eureka:
  client:
      service-url:
        defaultZone: http://localhost:8900/eureka/

---

spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/gate4}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
    drop-first: false
server:
  port: 8081
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8900/eureka/